<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bublet — hoard it. bubble it. name it. share it.</title>
  <meta name="description"
    content="Organize your saved links into little bubbles, put them in categories, and share those bubbles with anyone." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Landing Page ── */
    .landing {
      min-height: 100vh;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Background Decorations */
    .decorations {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .corner-blob {
      position: absolute;
      border: 3px solid var(--border-dark);
      box-shadow: 6px 6px 0px rgba(28, 21, 32, 0.4);
      opacity: 0.8;
    }


    @keyframes float-corner {
      0% {
        transform: rotate(0deg) scale(1);
      }

      100% {
        transform: rotate(10deg) scale(1.05);
      }
    }

    .decor-star {
      position: absolute;
      animation: spin 12s linear infinite;
      opacity: 0.9;
    }

    .decor-star path {
      stroke: var(--border-dark);
      stroke-width: 1.5px;
      stroke-linejoin: round;
    }

    .decor-star.pink path {
      fill: var(--rose);
    }

    .decor-star.gold path {
      fill: var(--gold);
    }

    .decor-star.blue path {
      fill: var(--sky);
    }

    .decor-star.peach path {
      fill: var(--peach);
    }

    .star-1 {
      top: 10%;
      right: 40%;
      width: 50px;
      height: 50px;
      animation-duration: 15s;
    }

    .star-2 {
      top: 35%;
      left: 45%;
      width: 30px;
      height: 30px;
      animation-duration: 8s;
      animation-direction: reverse;
    }

    .star-3 {
      bottom: 20%;
      left: 5%;
      width: 60px;
      height: 60px;
      animation-duration: 20s;
    }

    .star-4 {
      bottom: 15%;
      right: 25%;
      width: 40px;
      height: 40px;
      animation-duration: 12s;
      animation-direction: reverse;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Nav */
    .landing-nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 158px;
      /*border-bottom: 1px solid var(--border-dark);*/
    }

    .wordmark {
      font-family: var(--font-cursive);
      font-size: 3.1rem;
      font-weight: 700;
      color: var(--lavender);
    }

    .wordmark span {
      color: var(--rose);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text-light);
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 10px 60px;
    }

    .hero-left {
      flex: 1;
      max-width: 520px;
    }

    .hero-tagline {
      font-family: var(--font-cursive);
      font-size: 4.6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .hero-tagline .line {
      display: block;
    }

    .hero-tagline .hl-lavender {
      color: var(--lavender);
    }

    .hero-tagline .hl-rose {
      color: var(--rose);
    }

    .hero-tagline .hl-peach {
      color: var(--peach);
    }

    .hero-tagline .hl-gold {
      color: var(--gold);
    }

    .hero-divider {
      width: 60px;
      height: 3px;
      background: var(--rose);
      margin: 28px 0;
    }

    .hero-description {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 40px;
      font-weight: 400;
    }

    .hero-sub {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.6;
    }

    /* Right panel — organic splashes */
    .hero-right {
      flex: 1;
      max-width: 500px;
      height: 500px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splashes-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .splash-blob {
      position: absolute;
      border: 3px solid var(--border-dark);
      box-shadow: 6px 6px 0px rgba(28, 21, 32, 0.4);
      opacity: 0.95;
    }

    /* Giant lavender/rose blob */
    .splash-1 {
      width: 380px;
      height: 380px;
      background: linear-gradient(135deg, var(--lavender), var(--rose));
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      top: 50%;
      left: 50%;
      margin-top: -190px;
      margin-left: -190px;
      animation: float1 12s ease-in-out infinite;
      z-index: 1;
    }

    /* Peach/gold accent blob */
    .splash-2 {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, var(--peach), var(--gold));
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      bottom: 2%;
      right: 5%;
      animation: float2 15s ease-in-out infinite alternate;
      z-index: 2;
    }

    /* Sky blue tiny blob */
    .splash-3 {
      width: 130px;
      height: 130px;
      background: linear-gradient(135deg, var(--sky), var(--lavender));
      border-radius: 50% 50% 35% 65% / 65% 35% 55% 45%;
      top: 12%;
      left: 2%;
      animation: float3 10s ease-in-out infinite alternate-reverse;
      z-index: 3;
    }

    /* Sage green blob */
    .splash-4 {
      width: 170px;
      height: 170px;
      background: linear-gradient(135deg, var(--sage), var(--sky));
      border-radius: 35% 65% 55% 45% / 60% 40% 45% 55%;
      bottom: 22%;
      left: 2%;
      animation: float1 14s ease-in-out infinite reverse;
      z-index: 2;
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }

      50% {
        transform: translate(-15px, -15px) scale(1.05) rotate(-5deg);
      }
    }

    @keyframes float3 {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      50% {
        transform: translate(15px, 15px) rotate(10deg);
      }
    }

    /* Footer */
    .landing-footer {
      padding: 20px 48px;
      display: flex;
      justify-content: center;
      gap: 48px;
      border-top: 1px solid var(--border-dark);
    }

    .footer-item {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.5;
    }

    .footer-item::before {
      content: '✦ ';
      color: var(--lavender);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        padding: 40px 32px;
        gap: 40px;
      }

      .hero-left {
        max-width: 100%;
        text-align: center;
      }

      .hero-tagline {
        font-size: 2.6rem;
      }

      .hero-divider {
        margin: 20px auto;
      }

      .hero-right {
        max-width: 320px;
      }

      .landing-nav {
        padding: 20px 24px;
      }
    }

    @media (max-width: 500px) {
      .hero-tagline {
        font-size: 2rem;
      }

      .hero-description {
        font-size: 0.9rem;
      }

      .nav-links {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="landing" id="landing-page">

    <!-- Background Decorations -->
    <div class="decorations">
      <div class="corner-blob top-right"></div>
      <div class="corner-blob bottom-left"></div>

      <svg class="decor-star star-1 pink" viewBox="0 0 24 24">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z" />
      </svg>
      <svg class="decor-star star-2 gold" viewBox="0 0 24 24">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z" />
      </svg>
      <svg class="decor-star star-3 blue" viewBox="0 0 24 24">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z" />
      </svg>
      <svg class="decor-star star-4 peach" viewBox="0 0 24 24">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z" />
      </svg>
    </div>

    <!-- Nav -->
    <nav class="landing-nav">
      <div class="wordmark">bublet<span>.</span></div>
    </nav>

    <!-- Hero -->
    <main class="hero" id="about">
      <div class="hero-left">
        <p class="hero-sub">/// FOR ALL THE THINGS YOU FIND</p>
        <h1 class="hero-tagline">
          <span class="line"><span class="hl-rose">bubble</span> it.</span>
          <span class="line"><span class="hl-peach">name</span> it.</span>
          <span class="line"><span class="hl-gold">share</span> it.</span>
        </h1>
        <div class="hero-divider"></div>
        <p class="hero-description">
          Curate your favorite links into organized little spaces. <br />
          Save what matters, and share your bubbles with the world
        </p>
        <a href="dashboard.html" class="btn-primary">
          get started →
        </a>
      </div>

      <div class="hero-right">
        <div class="splashes-container">
          <div class="splash-blob splash-1"></div>
          <div class="splash-blob splash-2"></div>
          <div class="splash-blob splash-3"></div>
          <div class="splash-blob splash-4"></div>
        </div>
      </div>
    </main>

  </div>
</body>

</html>
